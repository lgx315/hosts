name: hosts

on:
  schedule:
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch:
    inputs:
      dns:
        description: 'DNS'
        required: true
        default: 'Aliyun'
        type: choice
        options:
        - 'Google'
        - 'Aliyun'

jobs:
  hosts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@main
      
      - name: Set up Python 3
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Init Env
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          sudo timedatectl set-timezone "Asia/Shanghai"
          python -m pip install --upgrade pip setuptools
          python -m pip install requests

      - name: Get Github Hosts
        env:
          DNS_PROVIDER: ${{ inputs.dns || 'Google' }}
        shell: python
        run: |
          import time, requests, os, re, socket

          # 你原来的 dnsChecker 完全不变
          class dnsChecker():
              def __init__(self) -> None:
                  self.dnsServers = {
                      "Google": "https://dns.google/resolve?name={}&type={}",
                      "Aliyun": "https://dns.alidns.com/resolve?name={}&type={}",
                  }
                  self.dnsidx = 'Google'

              def setServers(self, provider: str) -> None:
                  if provider in self.dnsServers:
                      self.dnsidx = provider

              def getServers(self):
                  return self.dnsidx

              def _query(self, qname: str, rdtype: str):
                  servers = getattr(self, 'dnsidx', 'Google')
                  url = self.dnsServers.get(self.dnsidx).format(qname, rdtype)
                  resp = requests.get(url, timeout=5)
                  if resp.status_code != 200:
                      return None
                  return resp.json()

              def check(self, qname: str, rdtype: str):
                  try:
                      data = self._query(qname, rdtype)
                      if not data or data.get('Status') != 0:
                          return False, []
                      answers = data.get('Answer') or []
                      ips = [a.get('data') for a in answers if a.get('data') and a.get('type') in (1, 28)]
                      if ips:
                          return True, [ips[0]]
                      cname_data = self._query(qname, 'CNAME')
                      if cname_data and cname_data.get('Status') == 0:
                          c_answers = cname_data.get('Answer') or []
                          cnames = [a.get('data').rstrip('.') for a in c_answers if a.get('type') == 5 and a.get('data')]
                          for target in cnames:
                              a_data = self._query(target, 'A')
                              if a_data and a_data.get('Status') == 0:
                                  a_ans = a_data.get('Answer') or []
                                  a_ips = [a.get('data') for a in a_ans if a.get('type') == 1]
                                  if a_ips:
                                      return True, [a_ips[0]]
                      return False, []
                  except Exception:
                      return False, []

          # 连通性测试
          def is_connectable(ip: str, port=443, timeout=2):
              try:
                  s = socket.socket(socket.AF_INET, socket.SOCK_STREAM)
                  s.settimeout(timeout)
                  res = s.connect_ex((ip, port))
                  s.close()
                  return res == 0
              except:
                  return False

          # 从多个可靠源获取 raw IP，并验证连通性
          def get_live_raw_ip():
              # 可靠、国内可访问的 hosts 源（2026-04 最新）
              sources = [
                  "https://raw.hellogithub.com/hosts",
                  "https://gitee.com/fliu2476/github-hosts/raw/main/hosts",
                  "https://gitee.com/godfather1103/github-hosts/raw/main/hosts",
                  "https://github.hosts.im/hosts"
              ]
              pattern = re.compile(r"(\d+\.\d+\.\d+\.\d+)\s+raw.githubusercontent.com")
              for url in sources:
                  try:
                      r = requests.get(url, timeout=6)
                      if r.status_code == 200:
                          match = pattern.search(r.text)
                          if match:
                              ip = match.group(1)
                              if is_connectable(ip):
                                  return ip
                  except:
                      continue
              # 官方备用池（永远保底）
              backup_ips = ["185.199.108.133", "185.199.109.133", "185.199.110.133", "185.199.111.133"]
              for ip in backup_ips:
                  if is_connectable(ip):
                      return ip
              return backup_ips[0]

          if __name__ == '__main__':
              gitHubDoMains = [
                  "github.io", "github.com", "github.blog", "github.community",
                  "api.github.com", "api.githubcopilot.com", "gist.github.com",
                  "codeload.github.com", "central.github.com", "collector.github.com",
                  "raw.github.com", "docs.github.com", "assets-cdn.github.com",
                  "raw.githubusercontent.com",  # 特殊处理
                  "camo.githubusercontent.com", "cloud.githubusercontent.com",
                  "media.githubusercontent.com", "desktop.githubusercontent.com",
                  "objects.githubusercontent.com", "favicons.githubusercontent.com",
                  "avatars5.githubusercontent.com", "avatars4.githubusercontent.com",
                  "avatars3.githubusercontent.com", "avatars2.githubusercontent.com",
                  "avatars1.githubusercontent.com", "avatars0.githubusercontent.com",
                  "avatars.githubusercontent.com", "user-images.githubusercontent.com",
                  "copilot-proxy.githubusercontent.com", "github-releases.githubusercontent.com",
                  "pipelines.actions.githubusercontent.com",
                  "pipelinesghubeus7.actions.githubusercontent.com",
                  "githubstatus.com", "collector.githubapp.com",
                  "github.githubassets.com", "analytics.githubassets.com",
                  "github.map.fastly.net", "github.global.ssl.fastly.net",
                  "github-cloud.s3.amazonaws.com", "github-com.s3.amazonaws.com",
                  "github-production-release-asset-2e65be.s3.amazonaws.com",
                  "github-production-user-asset-6210df.s3.amazonaws.com",
                  "github-production-repository-file-5c1aeb.s3.amazonaws.com"
              ]

              dockerDoMains = [
                  "registry.hub.docker.com", "hub.docker.com", "index.docker.io",
                  "ghcr.io", "gcr.io", "k8s.gcr.io", "quay.io"
              ]

              tMMDoMains = [
                  "themoviedb.org", "www.themoviedb.org", "api.themoviedb.org",
                  "tmdb.org", "api.tmdb.org", "image.tmdb.org",
                  "opensubtitles.org", "www.opensubtitles.org", "api.opensubtitles.org",
                  "assets.fanart.tv"
              ]

              dnsobj = dnsChecker()
              dnsservers = os.getenv('DNS_PROVIDER', 'Google')
              dnsobj.setServers(dnsservers)
              dnsList = []
              dnsList.append('# ING Hosts Start')
              dnsList.append('# Update at: {}'.format(time.strftime("%Y-%m-%d %H:%M:%S")))

              # GitHub
              dnsList.append('# GitHub Hosts Start')
              for domain in gitHubDoMains:
                  if domain == "raw.githubusercontent.com":
                      ip = get_live_raw_ip()
                      dnsList.append(ip.ljust(16) + domain)
                      continue
                  # 其他不变
                  ret, ips = dnsobj.check(domain, 'A')
                  if ret:
                      dnsList.append(ips[0].ljust(16) + domain)
              dnsList.append('# GitHub Hosts End')

              # Docker 不变
              dnsList.append('# Docker Hosts Start')
              for domain in dockerDoMains:
                  ret, ips = dnsobj.check(domain, 'A')
                  if ret:
                      dnsList.append(ips[0].ljust(16) + domain)
              dnsList.append('# Docker Hosts End')

              # TMM 不变
              dnsList.append('# TMM Hosts Start')
              for domain in tMMDoMains:
                  ret, ips = dnsobj.check(domain, 'A')
                  if ret:
                      dnsList.append(ips[0].ljust(16) + domain)
              dnsList.append('# TMM Hosts End')
              dnsList.append('# ING Hosts End')

              with open('hosts', 'w', encoding="utf-8") as f:
                  f.write('\n'.join(dnsList))

      - name: Check and Push
        run: |
          if [ -n "$(git status -s | grep hosts)" ]; then
            git add hosts
            git commit -m "update $(date +%Y-%m-%d %H:%M:%S)"
            git push -f
          fi
